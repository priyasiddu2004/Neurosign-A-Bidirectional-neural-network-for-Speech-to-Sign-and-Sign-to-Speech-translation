<div style="padding:16px; max-width:960px; margin:0 auto;">
  <h2>Teachable Machine - Pose Model</h2>
  <p>Model: <code>assets/models/sign models/</code></p>
  <div style="display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap;">
    <canvas id="tm-standalone" style="border-radius:12px; background:#f4f4f8; box-shadow:0 2px 10px rgba(0,0,0,.07);"></canvas>
    <div>
      <div><b>Label:</b> {{ tmLabel || '...' }} ({{ (tmConfidence * 100).toFixed(0) }}%)</div>
      <div style="margin-top:10px; display:flex; gap:10px;">
        <ion-button size="small" fill="outline" (click)="start()">Start</ion-button>
        <ion-button size="small" fill="clear" color="medium" (click)="stop()">Stop</ion-button>
        <ion-button size="small" fill="clear" color="danger" (click)="clearAccumulated()">Clear</ion-button>
      </div>
    </div>
  </div>

  <div style="margin-top:14px;">
    <h4 style="margin:0 0 6px 0;">Accumulated text</h4>
    <div style="min-height:60px; padding:10px 12px; border-radius:12px; background:#fafafa; border:1px solid #eee; box-shadow: inset 0 1px 2px rgba(0,0,0,.03); white-space: pre-wrap;">
      {{ accumulated || '...' }}
    </div>
  </div>
</div>
